name: Bump git submodules

on:
  schedule:
    - cron: '0 2 * * 6'  # Every Saturday at 02:00 UTC
  workflow_dispatch:

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Update submodules to latest remote
        run: |
          git submodule sync
          git submodule update --init --remote

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore: bump git submodules'
          branch: bump/git-submodules
          delete-branch: true
          title: 'chore: bump git submodules'
          body: |
            Automated weekly bump of all git submodules to their latest remote commits.
          labels: dependencies
